# --- ZMK TouchPass Settings ---
CONFIG_ZMK_TOUCHPASS=y

CONFIG_ZMK_TOUCHPASS_SERIAL_RPC=y
CONFIG_ZMK_TOUCHPASS_ALWAYS_ON=y

# XIAO BLEのUART0 (D4/D5) を指紋センサー専用に独占させる
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y # Required for USB CDC ACM (Web Serial) to function
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=n
CONFIG_PRINTK=n
CONFIG_STDOUT_CONSOLE=n

# USB Serial RPC
CONFIG_USB_DEVICE_STACK=y
CONFIG_UART_LINE_CTRL=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_PRODUCT="MeKaBu"

# Logging configuration (Completely disabled to prevent RPC pollution)
CONFIG_ZMK_USB_LOGGING=n
CONFIG_LOG=y # Keep internal log subsystem alive for Zephyr
CONFIG_ZMK_LOG_LEVEL_INF=y
CONFIG_LOG_BUFFER_SIZE=2048
CONFIG_LOG_BACKEND_UART=n # PREVENT logs from mixing with RPC JSON over CDC UART
CONFIG_UART_CONSOLE=n # PREVENT console from hijacking CDC UART
CONFIG_CONSOLE=y
CONFIG_REBOOT=y # Required for RPC reboot command
# EC11 resolution (Optimized for stability)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Disable ZMK Studio (Keep disabled for RPC stability)
CONFIG_ZMK_STUDIO=n

# Disable Display (OLED)
CONFIG_ZMK_DISPLAY=n

# NVS for fingerprint storage
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_SETTINGS=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y
